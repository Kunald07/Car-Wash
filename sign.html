<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — CarWash</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
      <link rel="icon" type="image/x-icon" href="/download (3).png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #C9A84C;
            --gold-light: #e8c96a;
            --dark: #0a0a0a;
            --dark-2: #111111;
            --white: #f5f5f5;
            --gray: #888;
        }

        body {
            background: var(--dark);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            /* overflow: hidden; */
        }

        /* Background image */
        .bg {
            position: fixed;
            inset: 0;
            background: url('https://images.unsplash.com/photo-1485291571150-772bcfc10da5?w=1400') center/cover no-repeat;
            filter: brightness(0.2);
            z-index: 0;
        }

        /* Gold glow blob */
        .bg-glow {
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(201, 168, 76, 0.12) 0%, transparent 70%);
            z-index: 1;
        }

        /* Card */
        .card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            background: rgba(14, 14, 14, 0.92);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 6px;
            padding: 28px 44px;
            backdrop-filter: blur(20px);
            animation: fadeUp 0.7s ease both;
        }

        @keyframes fadeUp {
            from {
                transform: translateY(24px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Logo */
        .card-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 14px;
            color: var(--dark);
            letter-spacing: 1px;
        }

        .logo-text span:first-child {
            display: block;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 18px;
            letter-spacing: 3px;
            color: var(--white);
        }

        .logo-text span:last-child {
            display: block;
            font-size: 8px;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
        }

        /* Heading */
        .card h2 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 36px;
            letter-spacing: 3px;
            color: var(--white);
            line-height: 1;
            margin-bottom: 6px;
        }

        .card h2 span {
            color: var(--gold);
        }

        .card .subtitle {
            font-size: 13px;
            color: var(--gray);
            font-weight: 300;
            margin-bottom: 20px;
            letter-spacing: 0.3px;
        }

        /* Form */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }

        .form-group label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(245, 245, 245, 0.45);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            padding: 13px 16px;
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            color: var(--white);
            outline: none;
            transition: border-color 0.3s;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.2);
        }

        .form-group input:focus {
            border-color: rgba(201, 168, 76, 0.55);
        }

        /* Password wrapper */
        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            padding-right: 44px;
        }

        .toggle-pass {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--gray);
            font-size: 17px;
            transition: color 0.3s;
        }

        .toggle-pass:hover {
            color: var(--gold);
        }

        /* Checkbox */
        .check-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin-bottom: 24px;
        }

        .check-row input[type="checkbox"] {
            margin-top: 2px;
            accent-color: var(--gold);
            width: 14px;
            height: 10px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .check-row label {
            font-size: 12px;
            color: var(--gray);
            line-height: 1.5;
            cursor: pointer;
        }

        .check-row label a {
            color: var(--gold);
            text-decoration: none;
        }

        .check-row label a:hover {
            text-decoration: underline;
        }

        /* Submit btn */
        .btn-submit {
            width: 100%;
            background: var(--gold);
            color: var(--dark);
            border: none;
            padding: 15px;
            font-family: 'Outfit', sans-serif;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            border-radius: 2px;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
            margin-bottom: 20px;
        }

        .btn-submit:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.07);
        }

        .divider span {
            font-size: 11px;
            color: var(--gray);
            letter-spacing: 1px;
        }

        /* Google btn */
        .btn-google {
            width: 100%;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            padding: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            margin-bottom: 28px;
        }

        .btn-google:hover {
            border-color: rgba(201, 168, 76, 0.3);
            background: rgba(255, 255, 255, 0.03);
        }

        .btn-google span {
            font-family: 'Outfit', sans-serif;
            font-size: 13px;
            color: rgba(245, 245, 245, 0.7);
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .google-icon {
            width: 18px;
            height: 18px;
        }

        /* Sign in link */
        .signin-link {
            text-align: center;
            font-size: 13px;
            color: var(--gray);
        }

        .signin-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
        }

        .signin-link a:hover {
            text-decoration: underline;
        }

        /* Success message */
        .success-msg {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .success-msg i {
            font-size: 48px;
            color: var(--gold);
            display: block;
            margin-bottom: 16px;
        }

        .success-msg h3 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 28px;
            letter-spacing: 3px;
            color: var(--white);
            margin-bottom: 8px;
        }

        .success-msg p {
            font-size: 13px;
            color: var(--gray);
        }

        @media (max-width: 500px) {
            .card {
                padding: 36px 24px;
                margin: 20px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }












        .card {
            padding: 32px 28px;
            max-width: 420px;
        }

        .card h2 {
            font-size: 30px;
        }

        .card .subtitle {
            margin-bottom: 22px;
        }

        /* Form spacing */
        .form-group {
            margin-bottom: 10px;
            gap: 4px;
        }

        /* Inputs */
        .form-group input {
            padding: 11px 14px;
            font-size: 12px;
        }

        /* Button */
        .btn-submit {
            padding: 12px;
            font-size: 11px;
            margin-bottom: 14px;
        }

        /* Google button */
        .btn-google {
            padding: 11px;
            margin-bottom: 20px;
        }

        /* Divider */
        .divider {
            margin-bottom: 14px;
        }
    </style>
</head>

<body>

    <div class="bg"></div>
    <div class="bg-glow"></div>

    <div class="card">

        <!-- Logo -->
        <div class="card-logo">
            <div class="logo-icon">CW</div>
            <div class="logo-text">
                <span>CarWash</span>
                <span>Auto Services</span>
            </div>
        </div>

        <!-- Form -->
        <div id="formSection">
            <h2>Create <span>Account.</span></h2>
            <p class="subtitle">Join us and experience premium car care.</p>

            <form id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" placeholder="Subhan" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" placeholder="Bhatti" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="subhan@example.com" required>
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" placeholder="+92 300 0000000">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrap">
                        <input type="password" id="pass" placeholder="Min. 8 characters" required>
                        <i class="ri-eye-off-line toggle-pass" id="togglePass"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="input-wrap">
                        <input type="password" id="confirmPass" placeholder="Repeat password" required>
                        <i class="ri-eye-off-line toggle-pass" id="toggleConfirm"></i>
                    </div>
                </div>

                <div class="check-row">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="divider"><span>OR</span></div>

            <button class="btn-google">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4"
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                    <path fill="#34A853"
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                    <path fill="#FBBC05"
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                    <path fill="#EA4335"
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                </svg>
                <span>Continue with Google</span>
            </button>

            <p class="signin-link">
                Already have an account? <a href="index.html">Sign In</a>
            </p>
        </div>

        <!-- Success Message -->
        <div class="success-msg" id="successMsg">
            <i class="ri-checkbox-circle-line"></i>
            <h3>Welcome Aboard!</h3>
            <p>Your account has been created successfully.<br>Redirecting you to homepage...</p>
        </div>

    </div>

    <script>
        // Password toggle
        document.getElementById('togglePass').addEventListener('click', function () {
            const pass = document.getElementById('pass');
            const isHidden = pass.type === 'password';
            pass.type = isHidden ? 'text' : 'password';
            this.className = isHidden ? 'ri-eye-line toggle-pass' : 'ri-eye-off-line toggle-pass';
        });

        document.getElementById('toggleConfirm').addEventListener('click', function () {
            const pass = document.getElementById('confirmPass');
            const isHidden = pass.type === 'password';
            pass.type = isHidden ? 'text' : 'password';
            this.className = isHidden ? 'ri-eye-line toggle-pass' : 'ri-eye-off-line toggle-pass';
        });

        // Form submit
        document.getElementById('signupForm').addEventListener('submit', function (e) {
            e.preventDefault();

            const pass = document.getElementById('pass').value;
            const confirm = document.getElementById('confirmPass').value;

            if (pass !== confirm) {
                alert('Passwords do not match!');
                return;
            }

            if (pass.length < 8) {
                alert('Password must be at least 8 characters!');
                return;
            }

            // Show success
            document.getElementById('formSection').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';

            // Redirect after 2.5 seconds
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 4500);
        });
    </script>

</body>

</html>
